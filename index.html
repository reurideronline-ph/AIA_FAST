<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>AIA FAST</title>
<meta name="theme-color" content="#D31145">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AIA FAST">
<style>
  :root{
    --navy:#0A2E5C;
    --navy2:#123B72;
    --blue:#1E88E5;
    --orange:#FF6B00;
    --gold:#FFB300;
    --deep:#071426;
    --life:#FF3B4E;
    --aia-red:#D31145;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--deep);overflow:hidden}
  #appFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:var(--deep)}

  /* ---------- splash ---------- */
  #splash{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:22px;
    background:radial-gradient(circle at 50% 40%, #0d2a4d 0%, #071426 70%);
    transition:opacity .5s ease, visibility .5s ease;
  }
  #splash.hide{opacity:0;visibility:hidden}

  .logo-wrap{
    position:relative;width:112px;height:112px;
    display:flex;align-items:center;justify-content:center;
  }
  .logo-wrap img{
    width:112px;height:112px;border-radius:50%;
    box-shadow:0 0 26px rgba(30,136,229,.35);
    object-fit:cover;
    background:#fff;
  }

  .brand{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#ffffff;font-weight:700;font-size:20px;letter-spacing:1px;
    text-shadow:0 0 20px rgba(30,136,229,.4);
    text-align:center;
  }
  .brand span{color:var(--aia-red)}

  /* ---------- running lifeline loader ---------- */
  .ecg-wrap{
    width:230px;height:64px;
    overflow:hidden;position:relative;
    -webkit-mask-image:linear-gradient(90deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
    mask-image:linear-gradient(90deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
  }
  .ecg-track{
    display:flex;width:600px;height:64px;
    animation:ecgRun 2.1s linear infinite;
  }
  .ecg-track svg{width:300px;height:64px;flex-shrink:0;display:block}
  .ecg-track path{
    fill:none;
    stroke:var(--life);
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
    filter:drop-shadow(0 0 6px rgba(255,59,78,.75));
  }
  @keyframes ecgRun{
    from{transform:translateX(0)}
    to{transform:translateX(-300px)}
  }

  .tagline{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#7a8aa3;font-size:11.5px;letter-spacing:3px;
    text-transform:uppercase;margin-top:-10px;
  }

  .retry{margin-top:4px;display:none;font-family:-apple-system,sans-serif}
  .retry a{color:var(--gold);font-size:13px;text-decoration:underline;cursor:pointer}

  .tagline-brand{
    position:absolute;left:0;right:0;bottom:22px;
    text-align:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#5c6f8c;font-size:10.5px;letter-spacing:2px;text-transform:uppercase;
  }

  /* ---------- install banner ---------- */
  #installBanner{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    transform:translateY(110%);
    transition:transform .35s cubic-bezier(.2,.8,.2,1);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
  }
  #installBanner.show{transform:translateY(0)}
  .install-card{
    max-width:480px;margin:0 auto;
    background:linear-gradient(120deg, var(--navy), var(--navy2));
    color:#fff;border-radius:16px;padding:13px 14px;
    display:flex;align-items:center;gap:12px;
    box-shadow:0 16px 40px -12px rgba(7,20,38,.6);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  .install-card img{width:36px;height:36px;border-radius:9px;flex-shrink:0;background:#fff}
  .install-card .copy{flex:1;min-width:0}
  .install-card .copy b{display:block;font-size:13.5px}
  .install-card .copy span{display:block;font-size:11.5px;color:rgba(255,255,255,.7);margin-top:1px}
  .install-card .actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .install-card button{border:none;border-radius:9px;font-weight:700;cursor:pointer;font-family:inherit}
  .install-card .install-btn{
    background:linear-gradient(120deg, var(--orange), var(--gold));
    color:#fff;padding:9px 14px;font-size:13px;
  }
  .install-card .dismiss-btn{background:transparent;color:rgba(255,255,255,.55);padding:9px 8px;font-size:18px;line-height:1}

  #iosSheet{
    position:fixed;inset:0;background:rgba(7,20,38,.55);z-index:30;
    display:none;align-items:flex-end;justify-content:center;
  }
  #iosSheet.show{display:flex}
  .ios-sheet-card{
    width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;
    padding:22px 22px calc(22px + env(safe-area-inset-bottom));
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  .ios-sheet-card h3{margin:0 0 12px;font-size:17px;color:var(--navy)}
  .ios-sheet-card ol{margin:0 0 16px;padding-left:20px;font-size:14px;line-height:1.9;color:#1a2a3d}
  .ios-sheet-card .close-btn{
    width:100%;border:none;background:#EEF2F8;color:var(--navy);font-weight:700;
    padding:12px;border-radius:11px;cursor:pointer;font-family:inherit;
  }
</style>
</head>
<body>
  <iframe
    id="appFrame"
    title="AIA FAST"
    allow="camera; clipboard-write; clipboard-read">
  </iframe>

  <div id="splash">
    <div class="logo-wrap">
      <img src="icon.png" alt="AIA FAST Logo">
    </div>
    <div class="brand"><span>AIA</span> FAST</div>

    <div class="ecg-wrap" aria-hidden="true">
      <div class="ecg-track">
        <svg viewBox="0 0 300 80" preserveAspectRatio="none">
          <path d="M0,40 H40 L55,26 L70,40 H95 L100,45 L106,6 L112,68 L118,40 H140 L160,25 L180,40 H300"/>
        </svg>
        <svg viewBox="0 0 300 80" preserveAspectRatio="none">
          <path d="M0,40 H40 L55,26 L70,40 H95 L100,45 L106,6 L112,68 L118,40 H140 L160,25 L180,40 H300"/>
        </svg>
      </div>
    </div>

    <div class="tagline">Checking your numbers' pulse</div>
    <div class="retry" id="retry">
      <a id="retryLink">Taking too long? Tap to retry</a>
    </div>

    <div class="tagline-brand">Healthier, Longer, Better Lives</div>
  </div>

  <!-- Install banner -->
  <div id="installBanner">
    <div class="install-card">
      <img src="icon.png" alt="">
      <div class="copy">
        <b>Install AIA FAST</b>
        <span>Add it to your home screen for one-tap access.</span>
      </div>
      <div class="actions">
        <button class="install-btn" id="installBtn">Install</button>
        <button class="dismiss-btn" id="dismissBtn" aria-label="Dismiss">×</button>
      </div>
    </div>
  </div>

  <!-- iOS manual install instructions -->
  <div id="iosSheet">
    <div class="ios-sheet-card">
      <h3>Install this app</h3>
      <ol>
        <li>Tap the <b>Share</b> icon in Safari's toolbar.</li>
        <li>Scroll down and tap <b>Add to Home Screen</b>.</li>
        <li>Tap <b>Add</b> to confirm.</li>
      </ol>
      <button class="close-btn" id="iosCloseBtn">Got it</button>
    </div>
  </div>

<script>
  // ---- Hardcoded Apps Script web app URL ----
  var APP_URL = 'https://script.google.com/macros/s/AKfycby1kI9lyMkIE851zv01_R-l8zEMtbxJseIRzCZNxNvewU4qTBzWYaBuO87XuYFZnwtAOw/exec';

  var frame  = document.getElementById('appFrame');
  var splash = document.getElementById('splash');
  var retry  = document.getElementById('retry');
  var hidden = false;

  function hideSplash(){
    if(hidden) return;
    hidden = true;
    splash.classList.add('hide');
  }

  frame.addEventListener('load', function(){ setTimeout(hideSplash, 350); });

  setTimeout(function(){ if(!hidden) retry.style.display = 'block'; }, 15000);
  document.getElementById('retryLink').addEventListener('click', function(){
    retry.style.display = 'none';
    frame.src = APP_URL + (APP_URL.indexOf('?') < 0 ? '?' : '&') + 'r=' + Date.now();
  });

  frame.src = APP_URL;

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }

  // ============================================================
  // Install banner
  // ============================================================
  (function(){
    var installBanner = document.getElementById('installBanner');
    var installBtn = document.getElementById('installBtn');
    var dismissBtn = document.getElementById('dismissBtn');
    var iosSheet = document.getElementById('iosSheet');
    var iosCloseBtn = document.getElementById('iosCloseBtn');

    var DISMISS_KEY = 'aia-fast-install-dismissed-at';
    var DISMISS_COOLDOWN_MS = 1000 * 60 * 60 * 24 * 7; // 7 days

    function isStandalone(){
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }
    function recentlyDismissed(){
      var t = localStorage.getItem(DISMISS_KEY);
      return t && (Date.now() - parseInt(t, 10)) < DISMISS_COOLDOWN_MS;
    }
    function markDismissed(){
      localStorage.setItem(DISMISS_KEY, String(Date.now()));
      installBanner.classList.remove('show');
    }

    var deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', function(e){
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone() && !recentlyDismissed()) {
        setTimeout(function(){ installBanner.classList.add('show'); }, 900);
      }
    });

    installBtn.addEventListener('click', function(){
      if (!deferredPrompt) return;
      installBanner.classList.remove('show');
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
    });

    dismissBtn.addEventListener('click', markDismissed);

    window.addEventListener('appinstalled', function(){
      installBanner.classList.remove('show');
      localStorage.removeItem(DISMISS_KEY);
    });

    // iOS Safari has no beforeinstallprompt — show manual instructions instead.
    function isIos(){
      return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
    }
    function isSafari(){
      return /^((?!chrome|android|crios|fxios).)*safari/i.test(navigator.userAgent);
    }

    if (isIos() && isSafari() && !isStandalone() && !recentlyDismissed()) {
      setTimeout(function(){ installBanner.classList.add('show'); }, 900);
      installBtn.addEventListener('click', function(){
        installBanner.classList.remove('show');
        iosSheet.classList.add('show');
      });
    }

    iosCloseBtn.addEventListener('click', function(){
      iosSheet.classList.remove('show');
      markDismissed();
    });
  })();
</script>
</body>
</html>
